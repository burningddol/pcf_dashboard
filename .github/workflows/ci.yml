name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint / Type / Format / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn tsc --noEmit

      - name: Format check
        run: yarn prettier --check "src/**/*.{ts,tsx}" "*.{ts,js,mjs,json}"

      - name: Test
        run: yarn test

      - name: Coverage
        run: yarn test:coverage

      - name: Build
        run: yarn build
